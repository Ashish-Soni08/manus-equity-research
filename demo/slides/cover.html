<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            box-sizing: border-box; 
            background: #121212;
            display: flex;
            font-family: 'Inter', sans-serif;
            color: #CED4DA;
            overflow: hidden;
        }
        .content-left {
            width: 55%;
            padding: 80px 80px 20px; /* keep top padding intact, reduce bottom padding */
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 2;
        }
        .image-right {
            width: 45%;
            height: 720px;
            position: relative;
        }
        .image-right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: left center;
        }
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 150px;
            height: 100%;
            background: linear-gradient(to right, #121212 0%, transparent 100%);
            z-index: 1;
        }
        h1 {
            font-family: 'Space Grotesk', monospace;
            font-weight: 600;
            font-size: 64px;
            color: #F8F9FA;
            line-height: 1.1;
            margin-bottom: 20px; /* reduced to save vertical space */
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }
        .subtitle {
            font-family: 'Space Grotesk', monospace;
            font-weight: 600;
            font-size: 28px;
            color: #00E5FF;
            margin-bottom: 12px; /* reduced */
            padding-left: 20px;
            border-left: 4px solid #20C997;
        }
        .metrics-container {
            display: flex;
            gap: 16px; /* tightened */
            margin-top: 12px;
            margin-bottom: 20px; /* reduced */
        }
        .metric-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px; /* reduced vertical padding */
            border-radius: 8px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }
        .metric-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #CED4DA;
            margin-bottom: 4px;
        }
        .metric-value {
            font-family: 'Space Grotesk', monospace;
            font-size: 24px;
            color: #F8F9FA;
        }
        .metric-value.hold { color: #BF8F00; }
        .meta-info {
            margin-top: auto;
            font-size: 20px;
            color: #888;
            display: flex;
            flex-direction: column;
            gap: 8px; /* slightly tighter */
        }
        .accent-line {
            width: 60px;
            height: 4px;
            background: #20C997;
            margin-bottom: 20px; /* reduced */
            box-shadow: 0 0 10px rgba(32, 201, 151, 0.5);
        }
    </style>
</head>
<body><div class="slide-container">
        <div class="content-left" style="transform: translate(-66.0172px, -4.58453px);">
            <div class="accent-line"></div>
            <h1>Palantir Technologies Inc. (NYSE: PLTR)</h1>
            <div class="subtitle">Equity Research Investment Memo</div>
<div class="metrics-container">
                <div class="metric-box">
                    <div class="metric-label">Recommendation</div>
                    <div class="metric-value hold">HOLD</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Target Price</div>
                    <div class="metric-value">$31.37</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Current Price</div>
                    <div class="metric-value">~$155</div>
                </div>
            </div>
<div class="meta-info">
                <div><strong>Date:</strong> March 28, 2026</div>
                <div><strong>Author:</strong> Manus AI Equity Research</div>
            </div>
        </div>
        <div class="image-right" style="transform: translate(-136px, -48.5845px);">
            <div class="gradient-overlay"></div>
            <ms-img style="position: relative; transform: translate(69.901px, 66.5845px) matrix(1, 0, 0, 1, 58.4134, -18); z-index: auto; width: 504px; height: 720px; min-width: 504px; min-height: 720px; max-width: 504px; max-height: 720px; margin: 0px; vertical-align: baseline; overflow: hidden; display: inline-block; padding: 0px; border: none; box-sizing: border-box;"><img src="/home/ubuntu/pltr-equity-research/charts/cover_image.png" alt="Cover Image" draggable="false" style="position: absolute; left: -417.776px; top: 1px; width: 1289.55px; height: 720px; min-width: 1289.55px; min-height: 720px; max-width: 1289.55px; max-height: 720px; object-fit: fill; object-position: 0px 0px; margin: 0px; padding: 0px; border: none; box-sizing: border-box; display: block;"></ms-img>
        </div>
    </div>
</body>
</html>
